<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Shared Shopping List</title>
<meta name="theme-color" content="#0a0a0f" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root{
  --bg:#0a0a0f; --card:#13131c; --input:#0d0d14; --border:#2a2a3a; --soft:#20202c;
  --text:#edeef2; --muted:#8b8b9a; --dim:#5a5a68; --accent:#4a9eff; --success:#22c55e; --danger:#ef4444;
}
body{ font-family:'Space Grotesk',system-ui,sans-serif; background:var(--bg); color:var(--text); line-height:1.45;
  min-height:100vh; padding:0 1rem calc(96px + env(safe-area-inset-bottom)); }
.wrap{ max-width:620px; margin:0 auto; }
header{ position:sticky; top:0; background:rgba(10,10,15,0.9); backdrop-filter:blur(12px);
  padding:1rem 0 0.7rem; border-bottom:1px solid var(--soft); display:flex; align-items:center; justify-content:space-between; gap:0.6rem; }
header h1{ font-size:1.2rem; font-weight:700; }
.status{ font-size:0.68rem; font-family:monospace; color:var(--dim); display:flex; align-items:center; gap:0.35rem; }
.status::before{ content:''; width:8px; height:8px; border-radius:50%; background:var(--dim); }
.status.live::before{ background:var(--success); box-shadow:0 0 6px var(--success); }
.status.off::before{ background:var(--danger); }
#items{ margin-top:1rem; }
.item{ display:flex; align-items:center; gap:0.7rem; background:var(--card); border:1px solid var(--soft);
  border-radius:12px; padding:0.7rem 0.85rem; margin-bottom:0.5rem; }
.item .chk{ width:28px; height:28px; flex-shrink:0; border-radius:8px; border:2px solid var(--border);
  background:none; color:#fff; font-size:0.9rem; display:grid; place-items:center; cursor:pointer; }
.item.done .chk{ background:var(--success); border-color:var(--success); }
.item .txt{ flex:1; font-size:0.95rem; }
.item.done .txt{ color:var(--muted); text-decoration:line-through; }
.item .del{ background:none; border:none; color:var(--dim); font-size:1rem; cursor:pointer; padding:0 4px; }
.empty{ color:var(--dim); text-align:center; padding:2rem 0; font-size:0.9rem; }
.addbar{ position:fixed; left:0; right:0; bottom:0; padding:0.7rem 1rem calc(0.7rem + env(safe-area-inset-bottom));
  background:rgba(15,15,22,0.96); backdrop-filter:blur(14px); border-top:1px solid var(--border); }
.addbar .inner{ max-width:620px; margin:0 auto; display:flex; gap:0.5rem; }
.addbar input{ flex:1; background:var(--input); border:1px solid var(--border); border-radius:10px;
  padding:0.7rem 0.9rem; color:var(--text); font-size:1rem; font-family:inherit; }
.addbar input:focus{ outline:none; border-color:var(--accent); }
.addbar button{ background:var(--accent); color:#fff; font-weight:700; border:none; border-radius:10px;
  padding:0 1.1rem; font-size:0.95rem; cursor:pointer; font-family:inherit; }
.hint{ text-align:center; color:var(--dim); font-size:0.72rem; margin-top:0.8rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🛒 <span id="listTitle">Shopping List</span></h1>
    <div class="status" id="status">connecting…</div>
  </header>
  <div id="items"></div>
  <p class="hint" id="hint">Anyone with this link can add &amp; check off items. Changes sync live.</p>
</div>
<div class="addbar">
  <div class="inner">
    <input id="addInput" type="text" placeholder="Add an item…" autocomplete="off" enterkeyhint="done" />
    <button id="addBtn">Add</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBoka43fZK0RIyJNrwfONn7x42IRTr0F8I",
  authDomain: "steve-s-health-protocol.firebaseapp.com",
  projectId: "steve-s-health-protocol",
  storageBucket: "steve-s-health-protocol.firebasestorage.app",
  messagingSenderId: "676334830769",
  appId: "1:676334830769:web:690fe8b99bf8f01922ce90"
};

const itemsEl=document.getElementById('items');
const statusEl=document.getElementById('status');
const id=new URLSearchParams(location.search).get('id');
const rid=()=> 'x'+Math.random().toString(36).slice(2,9);
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

if(!id){
  statusEl.textContent='no list';
  itemsEl.innerHTML='<p class="empty">This link is missing a list id.</p>';
} else {
  const app=initializeApp(firebaseConfig);
  const db=getFirestore(app);
  const ref=doc(db,'sharedLists',id);
  let current={ title:'Shopping List', items:[] };

  function render(){
    document.getElementById('listTitle').textContent=current.title||'Shopping List';
    if(!current.items || !current.items.length){ itemsEl.innerHTML='<p class="empty">Empty list — add the first item below.</p>'; return; }
    itemsEl.innerHTML=current.items.map((it,i)=>`<div class="item ${it.checked?'done':''}">
      <button class="chk" data-i="${i}" aria-label="toggle">${it.checked?'✓':''}</button>
      <span class="txt">${esc(it.text)}</span>
      <button class="del" data-d="${i}" aria-label="delete">✕</button></div>`).join('');
  }
  async function save(){ current.updatedAt=Date.now(); try{ await setDoc(ref,current); }catch(e){ statusEl.textContent='save failed'; statusEl.className='status off'; } }

  onSnapshot(ref, snap=>{
    statusEl.textContent='live'; statusEl.className='status live';
    if(snap.metadata.hasPendingWrites) return;
    if(snap.exists()){ const d=snap.data(); current={ title:d.title||'Shopping List', items:Array.isArray(d.items)?d.items:[], updatedAt:d.updatedAt }; }
    else { current={ title:'Shopping List', items:[] }; }
    render();
  }, err=>{ statusEl.textContent='offline'; statusEl.className='status off'; });

  itemsEl.addEventListener('click', e=>{
    const c=e.target.closest('.chk'); const d=e.target.closest('.del');
    if(c){ const i=+c.dataset.i; if(current.items[i]){ current.items[i].checked=!current.items[i].checked; render(); save(); } }
    else if(d){ const i=+d.dataset.d; current.items.splice(i,1); render(); save(); }
  });

  function add(){
    const inp=document.getElementById('addInput'); const v=inp.value.trim(); if(!v) return;
    current.items.push({ id:rid(), text:v, checked:false }); inp.value=''; render(); save(); inp.focus();
  }
  document.getElementById('addBtn').onclick=add;
  document.getElementById('addInput').addEventListener('keydown', e=>{ if(e.key==='Enter') add(); });
}
</script>
</body>
</html>
